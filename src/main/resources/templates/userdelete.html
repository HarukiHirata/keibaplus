<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ユーザー削除画面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link th:href="@{/css/style.css}" rel="stylesheet">
  </head>
  <body class="d-flex flex-column min-vh-100">
    <div th:replace="~{common/navbar :: navbar}"></div>
    <div class="container flex-grow-1">
      <h1 class="fs-1 fw-bold text-center mb-3 mb-md-5">ユーザー削除画面</h1>
      <div class="my-1 my-md-2 d-flex flex-column flex-md-row justify-content-center gap-2 fs-4 fs-md-3">
        <div class="text-center">ユーザーID</div>
        <div class="fw-bold text-center" th:text="${loginUserId}"></div>
      </div>
      <p class="fs-4 fs-md-3 text-center">削除しますか</h1>
      <div class="my-1 my-md-2 d-flex flex-column flex-md-row justify-content-center gap-2">
        <div class="text-center my-1 my-md-2">
          <a th:href="@{/top}" class="btn btn-secondary w-80 w-md-auto btn-responsive" type="button">キャンセル</a>
        </div>
        <div class="text-center my-1 my-md-2">
          <form th:action="@{/userdelete}" method="post">
            <button class="btn btn-danger w-80 w-md-auto btn-responsive" type="submit">削除</button>
          </form>
        </div>
      </div>
    </div>
    <div th:replace="~{common/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
