<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>利用開始画面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link th:href="@{/css/style.css}" rel="stylesheet">
  </head>
  <body>
    <div class="container text-center my-3 my-md-5">
      <h1 class="fs-2 fs-md-1 fw-bold m-2 m-md-4">競馬収支管理アプリ keibaplus</h1>
      <div class="my-1 my-md-2">
        <a th:href="@{/register}" class="btn btn-warning me-3 btn-responsive">今すぐ始める</a>
        <a th:href="@{/login}" class="btn btn-info btn-responsive">ログイン</a>
      </div>
    </div>
    <div class="container text-center">
      <div class="row justify-content-center">
        <div class="col-10 col-md-3 m-1 m-md-2 card bg-success-subtle">
          <p class="fs-5 fs-md-4">収支登録</p>
          <p class="fs-6 fs-md-5">レースごとに簡単入力</p>
        </div>
        <div class="col-10 col-md-3 m-1 m-md-2 card bg-warning-subtle">
          <p class="fs-5 fs-md-4">回収率計算</p>
          <p class="fs-6 fs-md-5">月ごとやコースごとなど様々な角度から分析</p>
        </div>
        <div class="col-10 col-md-3 m-1 m-md-2 card bg-info-subtle">
          <p class="fs-5 fs-md-4">料金無料</p>
          <p class="fs-6 fs-md-5">登録1分で今すぐ始められる</p>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
