<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>収支編集画面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link th:href="@{/css/style.css}" rel="stylesheet">
  </head>
  <body>
    <div th:replace="~{common/navbar :: navbar}"></div>
    <div class="container text-center">
      <h1 class="fs-2 fs-md-1 fw-bold m-2 m-md-4">収支編集画面</h1>
      <form th:action="@{/shuushiedit/{shuushiNo}(shuushiNo=${shuushiNo})}" th:object="${form}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" th:field="*{shuushiNo}" />
        <input type="hidden" th:field="*{userNo}" />
        <div class="row g-3 align-items-center my-1 my-md-3">
          <div class="col-12 col-md-3 text-start">
            <label class="form-label">レース日</label>
          </div>
          <div class="col-12 col-md-9">
            <input type="date" class="form-control" th:field="*{raceDate}" />
          </div>
          <div class="col-12 col-md-3 text-start">
            <label for="courseNo" class="form-label">コース</label>
          </div>
          <div class="col-12 col-md-9">
            <select class="form-select" id="courseNo" th:field="*{courseNo}">
              <option value="">--選択してください--</option>
              <option th:each="course : ${courseList}"
                      th:value="${course.courseNo}"
                      th:text="${course.courseName}">
              </option>
            </select>
          </div>
          <div class="col-12 col-md-3 text-start">
            <label class="form-label">レース番号</label>
          </div>
          <div class="col-12 col-md-9">
            <input type="text" class="form-control" th:field="*{raceNo}" />
          </div>
        </div>
        <div class="row g-3 align-items-center my-1 my-md-3">
          <div class="col-12 col-md-3 text-start">
            <label for="kenshuNo" class="form-label">券種</label>
          </div>
          <div class="col-12 col-md-9">
            <select class="form-select" id="kenshuNo" th:field="*{kenshuNo}">
              <option value="">--選択してください--</option>
              <option th:each="kenshu : ${kenshuList}"
                      th:value="${kenshu.kenshuNo}"
                      th:text="${kenshu.kenshuName}">
              </option>
            </select>
          </div>
        </div>
        <div class="row g-3 align-items-center my-1 my-md-3">
          <div class="col-12 col-md-3 text-start">
            <label class="form-label">購入金額</label>
          </div>
          <div class="col-12 col-md-9">
            <input type="number" class="form-control" th:field="*{kounyuuKingaku}" />
          </div>
        </div>
        <div class="row g-3 align-items-center my-1 my-md-3">
          <div class="col-12 col-md-3 text-start">
            <label class="form-label">払い戻し</label>
          </div>
          <div class="col-12 col-md-9">
            <input type="number" class="form-control" th:field="*{haraimodoshi}" />
          </div>
        </div>
        <div class="my-1 my-md-2 d-flex flex-column flex-md-row justify-content-center gap-2">
          <div class="text-center my-1 my-md-2">
            <a th:href="@{/shuushilist}" class="btn btn-secondary w-80 w-md-auto btn-responsive" type="button">収支一覧画面へ戻る</a>
          </div>
          <div class="text-center my-1 my-md-2">
            <button class="btn btn-warning  w-80 w-md-auto btn-responsive" type="submit">更新</button>
          </div>
        </div>
      </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
