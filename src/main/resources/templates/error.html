<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>エラー画面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link th:href="@{/css/style.css}" rel="stylesheet">
  </head>
  <body>
    <div class="container text-center my-3 my-md-5">
      <h1 class="fs-2 fs-md-1 fw-bold m-2 m-md-4">エラー</h1>
    </div>
    <div class="container text-center">
      <div class="row justify-content-center">
        <div class="col-12 m-3 m-md-6 card bg-danger-subtle">
          <p class="fs-6 fs-md-5">システムエラーが発生しました。再度ログインして操作をやり直してください。</p>
        </div>
      </div>
      <div class="m-3 m-md-6">
        <a th:href="@{/login}" class="btn btn-info btn-responsive">ログイン</a>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
