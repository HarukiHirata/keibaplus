<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>収支一覧画面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="container">
      <h1 class="fs-1 fw-bold text-center mb-3 mb-md-5">収支一覧画面</h1>
      <p class="fs-3 text-center mb-1 mb-md-2"><span class="fs-3 fw-bold" th:text="${loginUserNo}"></span>さんの収支一覧</p>
      <div class="text-center my-3 my-md-5">
          <div class="row g-3 align-items-center my-1 my-md-3">
            <div class="col-3 col-md-2">
              <label class="form-label text-center">開始日</label>
            </div>
            <div class="col-9 col-md-4">
              <input type="date" id="raceDateFrom" class="form-control">
            </div>
            <div class="col-3 col-md-2">
              <label class="form-label text-center">終了日</label>
            </div>
            <div class="col-9 col-md-4">
              <input type="date" id="raceDateTo" class="form-control">
            </div>
            <div class="col-3 col-md-2">
              <label class="form-label text-center">券種</label>
            </div>
            <div class="col-9 col-md-4">
              <select class="form-select" id="kenshuNo">
                <option value="">--選択してください--</option>
                <option th:each="kenshu : ${kenshuList}"
                        th:value="${kenshu.kenshuNo}"
                        th:text="${kenshu.kenshuName}">
                </option>
              </select>
            </div>
            <div class="col-3 col-md-2">
              <label class="form-label text-center">コース</label>
            </div>
            <div class="col-9 col-md-4">
              <select class="form-select" id="courseNo">
                <option value="">--選択してください--</option>
                <option th:each="course : ${courseList}"
                        th:value="${course.courseNo}"
                        th:text="${course.courseName}">
                </option>
              </select>
            </div>
          </div>
          <div class="text-center">
            <button type="button" class="btn btn-primary" onclick="search()">検索</button>
          </div>
        <div id="resultArea" class="table-responsive">
          <table class="table-striped table-hover table-bordered mx-auto w-auto">
              <thead class="table-light">
                <tr>
                    <th>券種</th>
                    <th>レース日</th>
                    <th>コース</th>
                    <th>レース</th>
                    <th>購入金額</th>
                    <th>払い戻し</th>
                    <th>編集</th>
                    <th>削除</th>
                </tr>
              </thead>
              <tbody id="resultBody">
                <tr>
                  <td colspan="7" class="text-center">検索結果はここに表示されます</td>
                </tr>
              </tbody>
          </table>
        </div>
      </div>
      <div class="text-center my-3 my-md-5">
        <form th:action="@{/logout}" method="post">
          <button class="btn btn-info" type="submit">ログアウト</button>
        </form>
      </div>
    </div>
    <script th:src="@{/js/shuushiitiran.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-jdSIJTK9l6XwXj3RixpVDXtMcA2bFd9O81RlLAwhpr2oXRqvQP88rr16IeFXTgFE" crossorigin="anonymous"></script>
  </body>
</html>
