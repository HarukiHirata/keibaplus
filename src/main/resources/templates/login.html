<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ログイン画面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link th:href="@{/css/style.css}" rel="stylesheet">
  </head>
  <body>
    <div class="container text-center">
      <h1 class="fs-2 fs-md-1 fw-bold m-2 m-md-4">ログイン画面</h1>
      <div class="my-1 my-md-2 position-fixed top-10 start-50 translate-middle-x z-3 w-80 w-md-50 px-1 px-md-0">
        <div id="registered"
        th:if="${param.registered}"
        class="alert alert-success alert-dismissible fade show small fs-md-5"
        role="alert"
        >
        登録が完了しました。ログインしてください。
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="閉じる"></button>
        </div>
        <div id="error"
        th:if="${param.error}"
        class="alert alert-danger alert-dismissible fade show small fs-md-5"
        role="alert"
        >
        ログインに失敗しました。ユーザーID・パスワードが誤っています。
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="閉じる"></button>
        </div>
        <div id="logout"
        th:if="${param.logout}"
        class="alert alert-success alert-dismissible fade show small fs-md-5"
        role="alert"
        >
        ログアウトしました。
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="閉じる"></button>
        </div>
      </div>
      <!-- <div class="text-center fs-3" th:if="${param.registered}">登録完了しました。ログインしてください</div>
      <div class="text-center fs-3" th:if="${param.error}">ログインに失敗しました。</div>
      <div class="text-center fs-3" th:if="${param.logout}">ログアウトしました。</div> -->
      <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="row g-3 align-items-center my-1 my-md-3">
          <div class="col-12 col-md-3 text-start">
            <label class="form-label">ユーザーID</label>
          </div>
          <div class="col-12 col-md-9">
            <input type="text" class="form-control" name="username">
          </div>
        </div>
        <div class="row g-3 align-items-center my-1 my-md-3">
          <div class="col-12 col-md-3 text-start">
            <label class="form-label">パスワード</label>
          </div>
          <div class="col-12 col-md-9">
            <input type="password" class="form-control" name="password">
          </div>
        </div>
        <div class="text-center my-3 my-md-5">
          <button class="btn btn-warning btn-responsive" type="submit">ログイン</button>
        </div>
      </form>
    </div>
    <script th:src="@{/js/login.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
