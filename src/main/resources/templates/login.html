<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ログイン画面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="container">
      <h1 class="fs-1 fw-bold text-center mb-3 mb-md-5">ログイン画面</h1>
      <div class="text-center fs-3" th:if="${param.registered}">登録完了しました。ログインしてください</div>
      <div class="text-center fs-3" th:if="${param.error}">ログインに失敗しました。</div>
      <div class="text-center fs-3" th:if="${param.logout}">ログアウトしました。</div>
      <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="row g-3 align-items-center my-1 my-md-3">
          <div class="col-12 col-md-3">
            <label class="form-label text-center">ユーザーID</label>
          </div>
          <div class="col-12 col-md-9">
            <input type="text" class="form-control" name="username">
          </div>
        </div>
        <div class="row g-3 align-items-center my-1 my-md-3">
          <div class="col-12 col-md-3">
            <label class="form-label text-center">パスワード</label>
          </div>
          <div class="col-12 col-md-9">
            <input type="password" class="form-control" name="password">
          </div>
        </div>
        <div class="text-center my-3 my-md-5">
          <button class="btn btn-info" type="submit">ログイン</button>
        </div>
      </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-jdSIJTK9l6XwXj3RixpVDXtMcA2bFd9O81RlLAwhpr2oXRqvQP88rr16IeFXTgFE" crossorigin="anonymous"></script>
  </body>
</html>
