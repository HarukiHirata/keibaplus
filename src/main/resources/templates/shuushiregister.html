<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>トップ画面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div th:replace="common/navbar :: navbar"></div>
    <div class="container">
      <h1 class="fs-1 fw-bold text-center mb-3 mb-md-5">収支登録画面</h1>
      <form th:action="@{/shuushiregister}" th:object="${form}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" th:value="${loginUserNo}" th:name="userNo" />
        <div class="row g-3 align-items-center my-1 my-md-3">
          <div class="col-12 col-md-3">
            <label class="form-label text-center">レース日</label>
          </div>
          <div class="col-12 col-md-9">
            <input type="date" class="form-control" th:field="*{raceDate}" />
          </div>
        </div>
        <div class="row g-3 align-items-center my-1 my-md-3">
          <div class="col-12 col-md-3">
            <label for="courseNo" class="form-label text-center">コース</label>
          </div>
          <div class="col-12 col-md-9">
            <select class="form-select" id="courseNo" th:field="*{courseNo}">
              <option value="">--選択してください--</option>
              <option th:each="course : ${courseList}"
                      th:value="${course.courseNo}"
                      th:text="${course.courseName}">
              </option>
            </select>
          </div>
        </div>
        <div class="row g-3 align-items-center my-1 my-md-3">
          <div class="col-12 col-md-3">
            <label class="form-label text-center">レース番号</label>
          </div>
          <div class="col-12 col-md-9">
            <input type="text" class="form-control" th:field="*{raceNo}" />
          </div>
        </div>
        <div class="row g-3 align-items-center my-1 my-md-3">
          <div class="col-12 col-md-3">
            <label for="kenshuNo" class="form-label text-center">券種</label>
          </div>
          <div class="col-12 col-md-9">
            <select class="form-select" id="kenshuNo" th:field="*{kenshuNo}">
              <option value="">--選択してください--</option>
              <option th:each="kenshu : ${kenshuList}"
                      th:value="${kenshu.kenshuNo}"
                      th:text="${kenshu.kenshuName}">
              </option>
            </select>
          </div>
        </div>
        <div class="row g-3 align-items-center my-1 my-md-3">
          <div class="col-12 col-md-3">
            <label class="form-label text-center">購入金額</label>
          </div>
          <div class="col-12 col-md-9">
            <input type="number" class="form-control" th:field="*{kounyuuKingaku}" />
          </div>
        </div>
        <div class="row g-3 align-items-center my-1 my-md-3">
          <div class="col-12 col-md-3">
            <label class="form-label text-center">払い戻し</label>
          </div>
          <div class="col-12 col-md-9">
            <input type="number" class="form-control" th:field="*{haraimodoshi}" />
          </div>
        </div>
        <div class="text-center my-3 my-md-5">
          <button class="btn btn-warning" type="submit">登録</button>
        </div>
      </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
