<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>新規登録画面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link th:href="@{/css/style.css}" rel="stylesheet">
  </head>
  <body>
    <div class="container text-center">
      <h1 class="fs-2 fs-md-1 fw-bold m-2 m-md-4">新規登録画面</h1>
      <form th:action="@{/register}" th:object="${form}" method="post">
        <div class="alert alert-danger text-start fs-6 fs-md-5" role="alert" th:if="${#fields.hasErrors()}">
          <ul class="mb-0">
            <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
          </ul>
        </div>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="row g-3 align-items-center my-1 my-md-3">
          <div class="col-12 col-md-4 text-start">
            <label class="form-label">ユーザーID（半角英数字・8～20文字）</label>
          </div>
          <div class="col-12 col-md-8">
            <input type="text" class="form-control" th:field="*{userId}" />
          </div>
          <div class="col-12 col-md-4 text-start">
            <label class="form-label">メールアドレス</label>
          </div>
          <div class="col-12 col-md-8">
            <input type="text" class="form-control" th:field="*{mailAddress}" />
          </div>
          <div class="col-12 col-md-4 text-start">
            <label class="form-label">パスワード（半角英数字記号・8～20文字）</label>
          </div>
          <div class="col-12 col-md-8">
            <input type="password" class="form-control" th:field="*{password}" />
          </div>
        </div>
        <div class="m-3 m-md-6">
          <a th:href="@{/termsOfUse}">利用規約</a>と<a th:href="@{/privacyPolicy}">プライバシーポリシー</a>に同意する
          <input class="form-check-input" type="checkbox" id="termsAndPolicyCheck" value="" aria-label="チェックボックス">
        </div>        
        <div class="text-center my-3 my-md-5">
          <button class="btn btn-warning btn-responsive" type="submit" id="registerButton" disabled>登録</button>
        </div>
      </form>
      <div class="text-center mt-3 mt-md-5">
        <a class="btn btn-info btn-responsive" th:href="@{/login}">ログインはこちら</a>
      </div>
      <script th:src="@{/js/register.js}"></script>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
