<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>新規登録画面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link th:href="@{/css/style.css}" rel="stylesheet">
  </head>
  <body>
    <div class="container text-center">
      <h1 class="fs-2 fs-md-1 fw-bold m-2 m-md-4">新規登録画面</h1>
      <form th:action="@{/register}" th:object="${form}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="row g-3 align-items-center my-1 my-md-3">
          <div class="col-12 col-md-3 text-start">
            <label class="form-label">ユーザーID</label>
          </div>
          <div class="col-12 col-md-9">
            <input type="text" class="form-control" th:field="*{userId}" />
          </div>
        </div>
        <div class="row g-3 align-items-center my-1 my-md-3">
          <div class="col-12 col-md-3 text-start">
            <label class="form-label">メールアドレス</label>
          </div>
          <div class="col-12 col-md-9">
            <input type="text" class="form-control" th:field="*{mailAddress}" />
          </div>
        </div>
        <div class="row g-3 align-items-center my-1 my-md-3">
          <div class="col-12 col-md-3 text-start">
            <label class="form-label">パスワード</label>
          </div>
          <div class="col-12 col-md-9">
            <input type="password" class="form-control" th:field="*{password}" />
          </div>
        </div>
        <div class="text-center my-3 my-md-5">
          <button class="btn btn-warning btn-responsive" type="submit">登録</button>
        </div>
      </form>
    </div>
    <div class="text-center mt-3 mt-md-5">
      <a class="btn btn-info btn-responsive" th:href="@{/login}">ログインはこちら</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
