<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>トップ画面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
  </head>
  <body>
    <div th:replace="common/navbar :: navbar"></div>
    <div class="container text-center">
      <h1 class="fs-2 fs-md-1 fw-bold m-2 m-md-4">トップ画面</h1>
      <div th:replace="common/searchCondition :: searchCondition"></div>
      <div class="text-center">
        <button type="button" class="btn btn-info" onclick="searchSummary()">検索</button>
      </div>
      <div class="row g-3 align-items-center my-1 my-md-3">
        <div class="col-12 col-md-4">
          <p class="fs-5">購入額合計: <span id="totalKounyuuKingaku" class="fw-bold">-</span></p>
        </div>
        <div class="col-12 col-md-4">
          <p class="fs-5">払戻額合計: <span id="totalHaraimodoshi" class="fw-bold">-</span></p>
        </div>
        <div class="col-12 col-md-4">
          <p class="fs-5">回収率: <span id="kaishuuritsu" class="fw-bold">-</span>%</p>
        </div>
      </div>

      <script th:src="@{/js/top.js}"></script>
      <script th:src="@{/js/searchCondition.js}"></script>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
