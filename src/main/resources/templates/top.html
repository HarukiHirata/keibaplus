<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>トップ画面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <h1 class="fs-1 fw-bold text-center mb-3 mb-md-5">トップ画面</h1>
    <p class="fs-3 text-center mb-1 mb-md-2">こんにちは<span class="fs-3 fw-bold" th:text="${loginUserNo}"></span>さん</p>
    <div class="text-center my-3 my-md-5">
      <a class="btn btn-info" th:href="@{/shuushitouroku}">収支登録</a>
    </div>
    <div class="text-center my-3 my-md-5">
      <a class="btn btn-info" th:href="@{/shuushiitiran}">収支一覧</a>
    </div>
    <div class="text-center my-3 my-md-5">
      <a class="btn btn-info" th:href="@{/shuushisummary}">収支まとめ</a>
    </div>
    <div class="text-center my-3 my-md-5">
      <form th:action="@{/logout}" method="post">
        <button class="btn btn-info" type="submit">ログアウト</button>
      </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-jdSIJTK9l6XwXj3RixpVDXtMcA2bFd9O81RlLAwhpr2oXRqvQP88rr16IeFXTgFE" crossorigin="anonymous"></script>
  </body>
</html>
