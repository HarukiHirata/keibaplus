<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>収支一覧画面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
  </head>
  <body>
    <div th:replace="~{common/navbar :: navbar}"></div>
    <div class="container text-center">
      <h1 class="fs-2 fs-md-1 fw-bold m-2 m-md-4">収支一覧画面</h1>
      <p class="fs-3 text-center mb-1 mb-md-2"><span class="fs-3 fw-bold" th:text="${loginUserId}"></span>さんの収支一覧</p>
      <div class="text-center my-3 my-md-5">
        <div th:replace="~{common/searchCondition :: searchCondition}"></div>
        <div class="text-center">
          <button type="button" class="btn btn-primary" onclick="search()">検索</button>
        </div>
        <div id="resultArea" class="table-responsive">
          <table class="table table-hover">
              <thead class="table-light">
                <tr>
                    <th>編集</th>
                    <th>削除</th>
                    <th>レース日</th>
                    <th>コース</th>
                    <th>レース番号</th>
                    <th>券種</th>
                    <th>購入金額</th>
                    <th>払い戻し</th>
                </tr>
              </thead>
              <tbody id="resultBody">
                <tr>
                  <td colspan="8" class="text-center">検索結果はここに表示されます</td>
                </tr>
              </tbody>
          </table>
        </div>
      </div>
    </div>
    <script th:src="@{/js/shuushilist.js}"></script>
    <script th:src="@{/js/searchCondition.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
