<div th:fragment="searchCondition">
    <div class="d-block d-md-none text-center mb-2">
        <span class="filter-toggle"
        data-bs-toggle="collapse"
        data-bs-target="#searchConditionArea"
        role="button"
        aria-expanded="false">
        絞り込み条件
        <i class="bi bi-chevron-down" id="arrowIcon"></i>
        </span>
    </div>
    <div class="d-none d-md-block mb-3">絞り込み条件</div>
    <div id="searchConditionArea" class="collapse d-md-block">
        <div class="row g-3 align-items-center my-1 my-md-3">
        <div class="col-3 col-md-2 text-start">
            <label class="form-label">開始日</label>
        </div>
        <div class="col-9 col-md-4">
            <input type="date" id="raceDateFrom" class="form-control">
        </div>
        <div class="col-3 col-md-2 text-start">
            <label class="form-label">終了日</label>
        </div>
        <div class="col-9 col-md-4">
            <input type="date" id="raceDateTo" class="form-control">
        </div>
        <div class="col-3 col-md-2 text-start">
            <label class="form-label">券種</label>
        </div>
        <div class="col-9 col-md-4">
            <select class="form-select" id="kenshuNo">
            <option value="">--選択してください--</option>
            <option th:each="kenshu : ${kenshuList}"
                    th:value="${kenshu.kenshuNo}"
                    th:text="${kenshu.kenshuName}">
            </option>
            </select>
        </div>
        <div class="col-3 col-md-2 text-start">
            <label class="form-label">コース</label>
        </div>
        <div class="col-9 col-md-4">
            <select class="form-select" id="courseNo">
            <option value="">--選択してください--</option>
            <option th:each="course : ${courseList}"
                    th:value="${course.courseNo}"
                    th:text="${course.courseName}">
            </option>
            </select>
        </div>
        </div>
    </div>
</div>
