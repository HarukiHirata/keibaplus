<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ユーザー情報変更画面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div th:replace="~{common/navbar :: navbar}"></div>
    <div class="container text-center">
      <h1 class="fs-2 fs-md-1 fw-bold m-2 m-md-4">ユーザー情報変更画面</h1>
      <form th:action="@{/useredit/{userNo}(userNo=${loginUserNo})}" th:object="${form}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" th:value="${loginUserNo}" th:field="*{userNo}" />
        <div class="row g-3 align-items-center my-1 my-md-3">
          <div class="col-12 col-md-3 text-start">
            <label class="form-label">ユーザーID</label>
          </div>
          <div class="col-12 col-md-9">
            <input type="text" class="form-control" th:field="*{userId}" />
          </div>
          <div class="col-12 col-md-3 text-start">
            <label class="form-label">メールアドレス</label>
          </div>
          <div class="col-12 col-md-9">
            <input type="text" class="form-control" th:field="*{mailAddress}" />
          </div>
          <div class="col-12 col-md-3 text-start">
            <label class="form-label">パスワード※変更しない場合は未入力のまま</label>
          </div>
          <div class="col-12 col-md-9">
            <input type="password" class="form-control" th:field="*{password}" />
          </div>
        </div>
        <div class="my-1 my-md-2 d-flex flex-column flex-md-row justify-content-center gap-2">
          <div class="text-center my-1 my-md-2">
            <a th:href="@{/top}" class="btn btn-secondary w-80 w-md-auto btn-responsive" type="button">トップ画面へ戻る</a>
          </div>
          <div class="text-center my-1 my-md-2">
            <button class="btn btn-warning  w-80 w-md-auto btn-responsive" type="submit">更新</button>
          </div>
        </div>
      </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
